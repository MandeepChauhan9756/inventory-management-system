services:

  db:
    image: postgres:16

    container_name: inventory_db

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inventory_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:

    build:
      context: ./backend

    container_name: inventory_backend

    restart: always

    depends_on:
      - db

    ports:
      - "5001:5000"

    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/inventory_db
      JWT_SECRET_KEY: inventory_secret_key

  frontend:
    build:
      context: ./frontend

    container_name: inventory_frontend

    restart: always

    ports:
      - "3000:80"

    depends_on:
      - backend

volumes:
  postgres_data: